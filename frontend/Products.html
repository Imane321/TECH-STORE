<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits — Aykon Tech Store</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">AYKON <span>TECH</span></a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Accueil</a>
        <a href="products.html?cat=pc">PCs</a>
        <a href="products.html?cat=phones">Téléphones</a>
        <a href="products.html?cat=accessories">Accessoires</a>
        <a href="products.html" class="active">Tous les produits</a>
      </div>
      <div class="nav-actions">
        <div class="nav-search">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        </div>
        <button class="cart-btn" id="cartToggle" aria-label="Panier">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <a href="login.html"><button class="btn-nav-auth btn-outline">Connexion</button></a>
      </div>
    </div>
  </nav>

  <div class="overlay" id="overlay" onclick="closeCart()"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 Mon Panier</h3>
      <button onclick="closeCart()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.4rem;">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cartTotal">0 MAD</span></div>
      <button class="btn-checkout" onclick="window.location.href='checkout.html'">Valider →</button>
    </div>
  </aside>

  <!-- PAGE HEADER -->
  <div class="page-top" style="padding-top:calc(var(--nav-height) + 40px); padding-bottom:40px; background:var(--bg-secondary); border-bottom:1px solid var(--border);">
    <div class="container">
      <div class="section-tag mb-8" id="pageCatTag">Catalogue</div>
      <h2 id="pageTitle">Tous les produits</h2>
      <p id="pageSubtitle">Explorer notre collection complète</p>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="section">
    <div class="container">
      <div class="shop-layout">

        <!-- SIDEBAR FILTERS -->
        <aside class="sidebar">
          <div class="filter-group">
            <div class="filter-title">Catégorie</div>
            <div class="filter-option"><input type="radio" name="cat" id="cat-all" value="" checked onchange="applyFilters()"><label for="cat-all">Tous <span class="filter-count">500+</span></label></div>
            <div class="filter-option"><input type="radio" name="cat" id="cat-pc" value="pc" onchange="applyFilters()"><label for="cat-pc">🖥️ PCs <span class="filter-count">120</span></label></div>
            <div class="filter-option"><input type="radio" name="cat" id="cat-phones" value="phones" onchange="applyFilters()"><label for="cat-phones">📱 Téléphones <span class="filter-count">85</span></label></div>
            <div class="filter-option"><input type="radio" name="cat" id="cat-accessories" value="accessories" onchange="applyFilters()"><label for="cat-accessories">🎧 Accessoires <span class="filter-count">295</span></label></div>
          </div>

          <div class="filter-group">
            <div class="filter-title">Marque</div>
            <div id="brandFilters">
              <div class="filter-option"><input type="checkbox" id="b-apple" value="Apple" onchange="applyFilters()"><label for="b-apple">Apple <span class="filter-count">32</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-samsung" value="Samsung" onchange="applyFilters()"><label for="b-samsung">Samsung <span class="filter-count">28</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-dell" value="Dell" onchange="applyFilters()"><label for="b-dell">Dell <span class="filter-count">18</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-hp" value="HP" onchange="applyFilters()"><label for="b-hp">HP <span class="filter-count">22</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-lenovo" value="Lenovo" onchange="applyFilters()"><label for="b-lenovo">Lenovo <span class="filter-count">15</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-xiaomi" value="Xiaomi" onchange="applyFilters()"><label for="b-xiaomi">Xiaomi <span class="filter-count">20</span></label></div>
              <div class="filter-option"><input type="checkbox" id="b-asus" value="Asus" onchange="applyFilters()"><label for="b-asus">Asus <span class="filter-count">14</span></label></div>
            </div>
          </div>

          <div class="filter-group price-range">
            <div class="filter-title">Prix (MAD)</div>
            <input type="range" id="priceRange" min="100" max="30000" value="30000" oninput="updatePrice(this.value)">
            <div style="display:flex;justify-content:space-between;margin-top:8px;">
              <span style="font-size:0.8rem;color:var(--text-muted)">100 MAD</span>
              <span style="font-size:0.85rem;color:var(--accent);font-weight:600" id="priceLabel">30 000 MAD</span>
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-title">Disponibilité</div>
            <div class="filter-option"><input type="checkbox" id="in-stock" value="instock" onchange="applyFilters()"><label for="in-stock">En stock uniquement</label></div>
          </div>

          <button onclick="resetFilters()" style="width:100%;padding:10px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;font-family:var(--font-body);font-size:0.85rem;margin-top:8px;">
            Réinitialiser les filtres
          </button>
        </aside>

        <!-- PRODUCTS AREA -->
        <div class="products-area">
          <div class="products-toolbar">
            <span class="results-count" id="resultsCount">Chargement...</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <label style="font-size:0.85rem;color:var(--text-muted);">Trier par :</label>
              <select id="sortSelect" onchange="applyFilters()" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:8px 12px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.85rem;cursor:pointer;">
                <option value="popular">Popularité</option>
                <option value="price-asc">Prix croissant</option>
                <option value="price-desc">Prix décroissant</option>
                <option value="newest">Nouveautés</option>
                <option value="rating">Mieux notés</option>
              </select>
            </div>
          </div>
          <div class="products-grid-area" id="productsGrid">
            <!-- Injecté via products.js -->
          </div>
          <div id="emptyState" style="display:none;text-align:center;padding:60px 0;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:16px;">🔍</div>
            <h3>Aucun produit trouvé</h3>
            <p>Essayez de modifier vos filtres</p>
          </div>
          <!-- PAGINATION -->
          <div id="pagination" style="display:flex;justify-content:center;gap:8px;margin-top:40px;"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
