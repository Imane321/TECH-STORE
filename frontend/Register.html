<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'inscrire — Aykon Tech Store</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">AYKON <span>TECH</span></a>
      <div class="nav-actions">
        <a href="login.html"><button class="btn-nav-auth btn-outline">Connexion</button></a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="width:56px;height:56px;background:var(--accent-dim);border:1px solid var(--border-accent);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.5rem;">👤</div>
        <h2>Créer un compte</h2>
        <p class="subtitle">Rejoignez la communauté Aykon Tech</p>
      </div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="firstName">Prénom</label>
            <input type="text" id="firstName" name="firstName" class="form-input" placeholder="Prénom" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Nom</label>
            <input type="text" id="lastName" name="lastName" class="form-input" placeholder="Nom" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Adresse email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="votre@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Téléphone</label>
          <input type="tel" id="phone" name="phone" class="form-input" placeholder="06 12 34 56 78">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 caractères" minlength="8" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Répétez le mot de passe" required>
        </div>
        <div style="margin-bottom:20px;">
          <label style="display:flex;align-items:flex-start;gap:10px;font-size:0.875rem;cursor:pointer;color:var(--text-secondary);">
            <input type="checkbox" id="terms" style="accent-color:var(--accent);margin-top:2px;" required>
            J'accepte les <a href="#" style="color:var(--accent);">conditions d'utilisation</a> et la <a href="#" style="color:var(--accent);">politique de confidentialité</a>
          </label>
        </div>
        <div id="registerError" style="display:none;background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:var(--radius-sm);padding:12px;font-size:0.875rem;color:#ff4444;margin-bottom:16px;"></div>
        <button type="submit" class="btn-submit">Créer mon compte</button>
      </form>

      <div style="text-align:center;margin-top:24px;font-size:0.875rem;color:var(--text-muted);">
        Déjà inscrit ? <a href="login.html" style="color:var(--accent);font-weight:600;">Se connecter</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
